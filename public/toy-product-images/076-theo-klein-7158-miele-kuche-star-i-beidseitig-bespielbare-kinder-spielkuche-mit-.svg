      <circle cx="230" cy="392" r="48" fill="#4fb3c4"/>
      <circle cx="440" cy="392" r="48" fill="#f07167"/>
      <rect x="95" y="496" width="500" height="54" rx="27" fill="#90be6d"/>
      <path d="M620 175c-72 44-72 156 0 200" fill="none" stroke="#6c7bd9" stroke-width="28" stroke-linecap="round"/>
