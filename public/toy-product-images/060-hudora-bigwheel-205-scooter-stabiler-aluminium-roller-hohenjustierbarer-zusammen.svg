  <title id="title">Neutrales Studio-Mockup zu Outdoor-Spielzeug</title>
  <desc id="desc">Lokales neutrales Studio-Mockup ohne Markenlogo, Preise oder Shop-Elemente.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
